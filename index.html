<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>循书集｜网页版型录</title>
  <style>
    :root {
      --bg: #f6f2ea;
      --paper: #fcfaf6;
      --ink: #2e5a47;
      --sub: #7a8b7f;
      --line: #d9d1c4;
      --shadow: 0 12px 30px rgba(65, 54, 35, 0.08);
      --radius: 22px;
      --max: 1200px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(213,231,213,.55), transparent 28%),
        radial-gradient(circle at top right, rgba(214,229,240,.45), transparent 22%),
        var(--bg);
      color: var(--ink);
    }
    .wrap {
      width: min(100%, var(--max));
      margin: 0 auto;
      padding: 28px 20px 72px;
    }
    .hero {
      background: rgba(252,250,246,.88);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(217,209,196,.6);
      border-radius: 28px;
      padding: 36px 28px 30px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }
    .eyebrow {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: #ebe4d5;
      color: var(--ink);
      font-size: 14px;
      letter-spacing: .08em;
    }
    h1 {
      font-size: clamp(34px, 6vw, 64px);
      line-height: 1.08;
      margin: 18px 0 10px;
      font-weight: 700;
    }
    .subtitle {
      font-size: clamp(16px, 2.5vw, 22px);
      color: var(--sub);
      margin: 0 0 18px;
    }
    .desc {
      max-width: 760px;
      line-height: 1.8;
      margin: 0;
      color: #4a5d55;
    }
    .nav {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin: 24px 0 0;
    }
    .nav-link {
      text-decoration: none;
      color: var(--ink);
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      transition: transform .15s ease, box-shadow .15s ease;
      box-shadow: 0 3px 10px rgba(65,54,35,.04);
    }
    .nav-link:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(65,54,35,.08);
    }
    .grid {
      display: grid;
      gap: 22px;
    }
    .page-card {
      background: rgba(252,250,246,.93);
      border: 1px solid rgba(217,209,196,.8);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }
    .page-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .page-num {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #ebe4d5;
      font-weight: 700;
      color: var(--ink);
    }
    .page-head h2 {
      margin: 0;
      font-size: clamp(20px, 3vw, 28px);
    }
    .page-image {
      width: 100%;
      display: block;
      border-radius: 18px;
      border: 1px solid rgba(217,209,196,.8);
      background: white;
    }
    .footer {
      text-align: center;
      color: var(--sub);
      font-size: 14px;
      margin-top: 26px;
    }
    @media (max-width: 640px) {
      .hero { padding: 26px 18px 22px; }
      .page-card { padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <span class="eyebrow">REREAD STUDIO · WEB</span>
      <h1>循书集｜网页版型录</h1>
      <p class="subtitle">把你的 8 页 PDF 型录做成一个可滚动浏览的单页网页</p>
      <p class="desc">
      </p>
      <nav class="nav">
        <a href="#page-1" class="nav-link">01 封面</a>
<a href="#page-2" class="nav-link">02 目录</a>
<a href="#page-3" class="nav-link">03 品牌介绍</a>
<a href="#page-4" class="nav-link">04 核心服务</a>
<a href="#page-5" class="nav-link">05 阅读体验</a>
<a href="#page-6" class="nav-link">06 用户故事</a>
<a href="#page-7" class="nav-link">07 使用方式</a>
<a href="#page-8" class="nav-link">08 联系我们</a>
      </nav>
    </header>

    <main class="grid">
      
    <section class="page-card" id="page-1">
      <div class="page-head">
        <span class="page-num">01</span>
        <h2>封面</h2>
      </div>
      <img src="xunshuji_web/assets/page_1.png" alt="循书集页面1" class="page-image" />
    </section>
    

    <section class="page-card" id="page-2">
      <div class="page-head">
        <span class="page-num">02</span>
        <h2>目录</h2>
      </div>
      <img src="xunshuji_web/assets/page_2.png" alt="循书集页面2" class="page-image" />
    </section>
    

    <section class="page-card" id="page-3">
      <div class="page-head">
        <span class="page-num">03</span>
        <h2>品牌介绍</h2>
      </div>
      <img src="xunshuji_web/assets/page_3.png" alt="循书集页面3" class="page-image" />
    </section>
    

    <section class="page-card" id="page-4">
      <div class="page-head">
        <span class="page-num">04</span>
        <h2>核心服务</h2>
      </div>
      <img src="xunshuji_web/assets/page_4.png" alt="循书集页面4" class="page-image" />
    </section>
    
    </main>

    <p class="footer">© 循书集 · 网页版型录展示</p>
  </div>
</body>
</html>
