<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>循书集｜数字型录</title>
  <style>
    body{
      margin:0;
      background:#f6f2ea;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
      color:#2e5a47;
    }

    .wrap{
      width:min(1100px,95%);
      margin:0 auto;
      padding:28px 0 60px;
    }

    .top{
      background:#fcfaf6;
      border:1px solid #d9d1c4;
      border-radius:24px;
      padding:24px;
      margin-bottom:24px;
      box-shadow:0 10px 24px rgba(0,0,0,0.06);
    }

    .brand{
      font-size:48px;
      font-weight:700;
      line-height:1.1;
      margin:0 0 20px;
      color:#2e5a47;
    }

    .nav{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
    }

    .nav a{
      display:block;
      text-align:center;
      text-decoration:none;
      color:#2e5a47;
      background:#ffffff;
      border:1px solid #d9d1c4;
      border-radius:14px;
      padding:12px 10px;
      font-size:14px;
    }

    .nav a:hover{
      background:#f2ede3;
    }

    .page{
      margin-bottom:28px;
      background:#fcfaf6;
      border:1px solid #d9d1c4;
      border-radius:20px;
      padding:16px;
      box-shadow:0 10px 24px rgba(0,0,0,0.06);
    }

    .page img{
      width:100%;
      display:block;
      border-radius:12px;
    }

    @media (max-width:768px){
      .brand{
        font-size:34px;
      }
      .nav{
        grid-template-columns:repeat(2,1fr);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="top">
      <h1 class="brand">循书集｜数字型录</h1>
      <div class="nav">
        <a href="#p1">01 封面</a>
        <a href="#p2">02 目录</a>
        <a href="#p3">03 品牌介绍</a>
        <a href="#p4">04 核心服务</a>
        <a href="#p5">05 阅读体验</a>
        <a href="#p6">06 用户故事</a>
        <a href="#p7">07 使用方式</a>
        <a href="#p8">08 联系我们</a>
      </div>
    </div>

    <div class="page" id="p1"><img src="page_1.png" alt="page 1"></div>
    <div class="page" id="p2"><img src="page_2.png" alt="page 2"></div>
    <div class="page" id="p3"><img src="page_3.png" alt="page 3"></div>
    <div class="page" id="p4"><img src="page_4.png" alt="page 4"></div>
    <div class="page" id="p5"><img src="page_5.png" alt="page 5"></div>
    <div class="page" id="p6"><img src="page_6.png" alt="page 6"></div>
    <div class="page" id="p7"><img src="page_7.png" alt="page 7"></div>
    <div class="page" id="p8"><img src="page_8.png" alt="page 8"></div>

  </div>
</body>
</html>
